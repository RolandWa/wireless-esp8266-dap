name: build
on:
  workflow_dispatch:
  push:
    paths-ignore:
      - '**.md'
      - 'circuit/**'
  pull_request:
    paths-ignore:
      - '**.md'
      - 'circuit/**'

jobs:
  build:
    runs-on: ubuntu-24.04
    continue-on-error: true
    strategy:
      matrix:
        target-hardware: [esp8266, esp32, esp32c3, esp32s3]

    steps:
    # 1. Checkout without submodules to prevent initial clone failure due to broken URLs
    - uses: actions/checkout@v4
      with:
        submodules: false
        fetch-depth: 1

    # 2. CRITICAL FIX: Remap the broken Eclipse git URL to the GitHub mirror before initializing submodules
    # This addresses the 'unable to update url base from redirection' error in libcoap/tinydtls
    - name: Fix and Update Submodules
      run: |
        git config --global url."https://github.com/eclipse/tinydtls.git".insteadOf "https://git.eclipse.org/r/tinydtls/org.eclipse.tinydtls"
        git submodule update --init --recursive

    # 3. Install system dependencies and Python tools
    # 'esptool' is installed via pip to avoid cloning the repository manually for each matrix job
    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y gcc git wget make libncurses-dev flex bison python-is-python3 python3-setuptools python3-pip python3-serial ninja-build
        # python -m pip install esptool

    # 4. Setup Xtensa Toolchain (Required only for ESP8266 legacy SDK)
    - name: Setup Toolchain (ESP8266)
      if: matrix.target-hardware == 'esp8266'
      run: |
        wget https://dl.espressif.com/dl/xtensa-lx106-elf-linux64-1.22.0-100-ge567ec7-5.2.0.tar.gz
        tar -xzf ./xtensa-lx106-elf-linux64-1.22.0-100-ge567ec7-5.2.0.tar.gz
        python -m pip install --user -r ./ESP8266_RTOS_SDK/requirements.txt

    # 5. Build process for ESP8266 (Legacy Make/CMake system)
    - name: Build (ESP8266)
      if: matrix.target-hardware == 'esp8266'
      run: |
        export VERBOSE=1
        export IDF_PATH=$PWD/ESP8266_RTOS_SDK
        export PATH="$PATH:$PWD/xtensa-lx106-elf/bin"
        python ./idf.py fullclean
        python ./idf.py build

    # 6. CRITICAL FIX: Force Enable MDNS in sdkconfig for ESP32 family
    - name: Force Enable MDNS in sdkconfig
      if: matrix.target-hardware != 'esp8266'
      run: |
        CONFIG_FILE="sdkconfig.${{ matrix.target-hardware }}"
        if [ -f "$CONFIG_FILE" ]; then
         echo "Using target-specific config file: $CONFIG_FILE"
        elif [ -f "sdkconfig" ]; then
         CONFIG_FILE="sdkconfig"
         echo "Using default config file: $CONFIG_FILE"
        else
         echo "Warning: No sdkconfig file found. Skipping MDNS fix."
         exit 0
        fi
    
        echo "Forcing CONFIG_MDNS_ENABLED=y into $CONFIG_FILE"
        sed -i '/CONFIG_MDNS_ENABLED/d' "$CONFIG_FILE" 2>/dev/null || true
        echo "CONFIG_MDNS_ENABLED=y" >> "$CONFIG_FILE"

    # 7. Build process for ESP32 family (Using official Docker container action)
    - name: Build (ESP32 family)
      if: matrix.target-hardware != 'esp8266'
      uses: espressif/esp-idf-ci-action@v1
      with:
        esp_idf_version: v5.4.3
        target: ${{ matrix.target-hardware }}
        path: './'

    # 8. Merge binary files into a single factory firmware
    # Logic handles specific bootloader offsets: 0x1000 for original ESP32, 0x0 for others
    - name: Merge binary files
      run: |
        git clone https://github.com/espressif/esptool.git
        git -C ./esptool/ checkout tags/v4.6.2 -b merge_wirless_bin
        # sudo pip3 install ./esptool/
        BOOTLOADER_OFFSET="0x0"
        if [ "${{ matrix.target-hardware }}" == "esp32" ]; then
          BOOTLOADER_OFFSET="0x1000"
        fi
        
        echo "Merging binaries for ${{ matrix.target-hardware }} with bootloader offset $BOOTLOADER_OFFSET..."
        
        sudo python3 ./esptool/esptool.py --chip ${{ matrix.target-hardware }} merge_bin \
        -o build/wireless_esp_dap_full.bin \
        $BOOTLOADER_OFFSET build/bootloader/bootloader.bin \
        0x8000 build/partition_table/partition-table.bin \
        0x10000 build/wireless_esp_dap.bin
          
        sudo mv build/wireless_esp_dap.bin build/wireless_esp_dap_app.bin

    - name: Upload firmware artifacts
      uses: actions/upload-artifact@v4
      with:
        name: firmware_${{ matrix.target-hardware }}.zip
        path: |
          build/wireless_esp_dap_full.bin
          build/wireless_esp_dap_app.bin
          build/bootloader/bootloader.bin
          build/partition_table/partition-table.bin
